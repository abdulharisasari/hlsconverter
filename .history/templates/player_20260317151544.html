<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background:#000; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        video { width:80%; max-width:900px; border-radius:12px; }
        #loading { display:flex; position:fixed; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); z-index:9999; }
        #offline { display:none; text-align:center; color:white; }
        a { color:cyan; }
        @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    </style>
</head>
<body 
    data-hls-url="{{ hls_url }}"
    data-stream-id="{{ stream_id }}"
    data-fallback-url="{{ fallback_url }}"
    data-is-offline="{{ '1' if is_offline else '0' }}"
    data-error-message="{{ error_message }}">

<video id="video" controls autoplay muted></video>

<div id="offline">
    <h2>Stream offline</h2>
    <a id="fallbackLink" href="#" target="_blank">Buka stream langsung</a>
</div>

<div id="loading">
    <div style="text-align:center;color:#fff;">
        <div style="width:48px;height:48px;margin:0 auto 12px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite"></div>
        <div id="loadingText">Loading stream...</div>
    </div>
</div>


</body>
</html>
