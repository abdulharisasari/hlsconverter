<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        video {
            width: 80%;
            max-width: 900px;
            border-radius: 12px;
        }

        #loading {
            display:flex;
            position:fixed;
            inset:0;
            align-items:center;
            justify-content:center;
            background:rgba(0,0,0,0.6);
            z-index:9999;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<video id="video" controls autoplay muted></video>

<div id="offline" style="display:none; text-align:center;">
    <p style="color:white; font-size:18px;">Stream offline</p>
    <a id="fallbackLink" href="#" target="_blank" style="color:cyan; font-size:16px;">
        Buka stream langsung
    </a>
</div>

<div id="loading">
    <div style="text-align:center;color:#fff;">
        <div style="width:48px;height:48px;margin:0 auto 12px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite"></div>
        <div id="loadingText">Loading stream...</div>
    </div>
</div>

<script>
const video = document.getElementById('video');

let src = "{{ hls_url }}";
let streamId = "{{ stream_id }}";

let hlsInstance = null;
let playerStarted = false;

const loadingEl = document.getElementById('loading');

function showLoading(text) {
    const t = document.getElementById('loadingText');
    if (t && text) t.textContent = text;
    loadingEl.style.display = 'flex';
}

function hideLoading() {
    loadingEl.style.display = 'none';
}


function showOffline(text = "Stream offline / tidak ada video") {
    hideLoading();

    const videoEl = document.getElementById('video');
    const offlineEl = document.getElementById('offline');
    const linkEl = document.getElementById('fallbackLink');

    videoEl.style.display = "none";
    offlineEl.style.display = "block";

    if (fallbackUrl) {
        linkEl.href = fallbackUrl;
        linkEl.style.display = "inline";
    } else {
        linkEl.style.display = "none";
    }

    // stop HLS
    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }
}

// ==========================
// CHECK STREAM READY
// ==========================
async function checkReady() {
    if (playerStarted) return;

    showLoading('Waiting for stream...');

    try {
        const res = await fetch("/stream-ready/" + streamId);
        const data = await res.json();

        if (data.ready) {
            playerStarted = true;
            startPlayer();
        } else {
            setTimeout(checkReady, 1000);
        }
    } catch (e) {
        setTimeout(checkReady, 1000);
    }
}

// ==========================
// START PLAYER
// ==========================
function startPlayer() {
    let hasPlayed = false;

    showLoading('Loading stream...');

    if (Hls.isSupported()) {
        hlsInstance = new Hls();

        hlsInstance.loadSource(src);
        hlsInstance.attachMedia(video);

        video.addEventListener('playing', () => {
            hasPlayed = true;
            hideLoading();
        });

        video.addEventListener('waiting', () => {
            if (hasPlayed) {
                showLoading('Buffering...');
            }
        });

        hlsInstance.on(Hls.Events.ERROR, function (event, data) {
            console.log("HLS error:", data);

            if (data.fatal) {
                if (!hasPlayed) {
                   showOffline();
                } else {
                    showLoading('Reconnect...');
                    setTimeout(() => startPlayer(), 2000);
                }
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = src;

        video.addEventListener('playing', () => {
            hasPlayed = true;
            hideLoading();
        });

        video.addEventListener('error', () => {
            showLoading('Stream tidak tersedia');
        });
    }
}

// ==========================
// INIT
// ==========================
if (src && src.includes(".m3u8")) {
    showLoading("Starting stream...");
    startPlayer();
} else {
    checkReady();
}

// ==========================
// KEEP ALIVE
// ==========================
setInterval(() => {
    fetch('/ping/' + streamId);
}, 30000);

// ==========================
// CLOSE EVENT
// ==========================
window.addEventListener('beforeunload', function() {
    navigator.sendBeacon('/close/' + streamId);
});
</script>


</body>
</html>
