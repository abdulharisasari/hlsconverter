<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        video {
            width: 80%;
            max-width: 900px;
            border-radius: 12px;
        }

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
        }

        #offline {
            display: none;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<video id="video" controls autoplay muted></video>

<div id="offline">
    <h2>Stream Offline</h2>
    <p id="errorText"></p>
    <a id="fallbackLink" target="_blank">Buka stream langsung</a>
</div>

<div id="loading">Loading...</div>

<script>
const video = document.getElementById('video');
const loading = document.getElementById('loading');
const offline = document.getElementById('offline');

let src = "{{ hls_url }}";
let fallback = "{{ fallback_url }}";
let is_offline = "{{ is_offline | tojson }}";
let error_message = "{{ error_message | tojson }}";

// =========================
// OFFLINE
// =========================
function showOffline() {
    loading.style.display = "none";
    video.style.display = "none";

    offline.style.display = "block";

    document.getElementById("errorText").innerText = error_message || "";

    if (fallback) {
        let link = document.getElementById("fallbackLink");
        link.href = fallback;
    }
}

// =========================
// PLAYER
// =========================
function startPlayer() {
    let started = false;

    let timeout = setTimeout(() => {
        if (!started) showOffline();
    }, 8000);

    if (Hls.isSupported()) {
        let hls = new Hls();
        hls.loadSource(src);
        hls.attachMedia(video);

        video.onplaying = () => {
            started = true;
            clearTimeout(timeout);
            loading.style.display = "none";
        };

        hls.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal) showOffline();
        });

    } else {
        video.src = src;
    }
}

// =========================
// INIT
// =========================
if (is_offline) {
    showOffline();
} else {
    startPlayer();
}
</script>

</body>
</html>
