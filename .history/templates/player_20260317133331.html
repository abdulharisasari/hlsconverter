<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        video {
            width: 80%;
            max-width: 900px;
            border-radius: 12px;
        }

        #loading {
            display:flex;
            position:fixed;
            inset:0;
            align-items:center;
            justify-content:center;
            background:rgba(0,0,0,0.6);
            z-index:9999;
        }

        #offline {
            display:none;
            text-align:center;
            color:white;
        }

        a {
            color:cyan;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<video id="video" controls autoplay muted></video>

<div id="offline">
    <h2>Stream offline</h2>
    <a id="fallbackLink" href="#" target="_blank">
        Buka stream langsung
    </a>
</div>

<div id="loading">
    <div style="text-align:center;color:#fff;">
        <div style="width:48px;height:48px;margin:0 auto 12px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite"></div>
        <div id="loadingText">Loading stream...</div>
    </div>
</div>
<script>
const video = document.getElementById('video');

let src = "{{ hls_url }}";
let streamId = "{{ stream_id }}";
let fallback_url = "{{ fallback_url }}";
window.is_offline = "{{ is_offline | tojson | safe }}";
window.error_message = {{ error_message | tojson | safe }};

// ✅ TAMBAHKAN INI
const is_offline = window.is_offline;
const error_message = window.error_message;
let hlsInstance = null;
let playerStarted = false;

const loadingEl = document.getElementById('loading');

// ==========================
// LOADING
// ==========================
function showLoading(text) {
    const t = document.getElementById('loadingText');
    if (t && text) t.textContent = text;
    loadingEl.style.display = 'flex';
}

function hideLoading() {
    loadingEl.style.display = 'none';
}

// ==========================
// OFFLINE
// ==========================
function showOffline() {
    hideLoading();

    video.style.display = "none";

    const offlineEl = document.getElementById('offline');
    const linkEl = document.getElementById('fallbackLink');

    offlineEl.style.display = "block";

    // tampilkan error kalau ada
    if (error_message) {
        offlineEl.innerHTML += `<p>${error_message}</p>`;
    }

    if (fallback_url) {
        linkEl.href = fallback_url;
        linkEl.style.display = "inline";
    } else {
        linkEl.style.display = "none";
    }

    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }
}

// ==========================
// CHECK STREAM READY
// ==========================
async function checkReady() {
    if (playerStarted) return;

    showLoading('Waiting for stream...');

    try {
        const res = await fetch("/ping/" + streamId);
        const data = await res.json();

        if (data.ready) {
            playerStarted = true;
            startPlayer();
        } else {
            setTimeout(checkReady, 1000);
        }
    } catch (e) {
        setTimeout(checkReady, 1000);
    }
}

// ==========================
// START PLAYER
// ==========================
function startPlayer() {
    let hasPlayed = false;

    showLoading('Loading stream...');

    let timeout = setTimeout(() => {
        if (!hasPlayed) {
            showOffline();
        }
    }, 8000);

    if (Hls.isSupported()) {
        hlsInstance = new Hls();

        hlsInstance.loadSource(src);
        hlsInstance.attachMedia(video);

        video.addEventListener('playing', () => {
            hasPlayed = true;
            clearTimeout(timeout);
            hideLoading();
        });

        video.addEventListener('waiting', () => {
            if (hasPlayed) {
                showLoading('Buffering...');
            }
        });

        hlsInstance.on(Hls.Events.ERROR, function (event, data) {
            console.log("HLS error:", data);

            if (data.fatal) {
                clearTimeout(timeout);

                if (!hasPlayed) {
                    showOffline();
                } else {
                    showLoading('Reconnect...');
                    setTimeout(() => startPlayer(), 2000);
                }
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = src;

        video.addEventListener('playing', () => {
            hasPlayed = true;
            clearTimeout(timeout);
            hideLoading();
        });

        video.addEventListener('error', () => {
            showOffline();
        });
    }
}

// ==========================
// INIT (INI YANG PALING PENTING)
// ==========================
if (is_offline) {
    showOffline();
}
else if (src && src.includes(".m3u8")) {
    showLoading("Starting stream...");
    startPlayer();
}
else if (streamId) {
    checkReady();
}
else {
    showOffline();
}

// ==========================
// KEEP ALIVE
// ==========================
setInterval(() => {
    if (streamId) {
        fetch('/ping/' + streamId);
    }
}, 30000);
</script>

</body>
</html>
